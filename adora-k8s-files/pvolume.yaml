apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: site-storage-pvc
spec:
  storageClassName: sitevol
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 3Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: site-storage-pv
spec:
  capacity:
    storage: 3Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: sitevol
  hostPath:
    path: "/data/adoraburu-strg"