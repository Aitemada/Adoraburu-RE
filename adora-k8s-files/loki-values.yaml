deploymentMode: SingleBinary
loki:
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  commonConfig:
    replication_factor: 1
  storage:
    type: 'filesystem'

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 1.5Gi
chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false
promtail:
  enabled: true
  config:
    clients:
      # Point Promtail directly to the Loki single binary
      - url: http://loki:3100/loki/api/v1/push
    